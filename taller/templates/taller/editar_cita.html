<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cita - ServiMax</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-volver { background: #e2e8f0; color: #475569; padding: 10px 20px; text-decoration: none; border-radius: 10px; font-weight: 600; transition: 0.2s; }
        .btn-volver:hover { background: #cbd5e1; color: #0f172a; }

        .card-formulario { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; border-top: 5px solid #3b82f6; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full-width { grid-column: span 2; }
        
        label { font-weight: 600; color: #475569; font-size: 0.9em; }
        
        .modern-input { border: 1px solid #cbd5e1; border-radius: 10px; padding: 12px; font-family: 'Inter', sans-serif; font-size: 1em; outline: none; transition: all 0.2s; background: #f8fafc; width: 100%; box-sizing: border-box; }
        .modern-input:focus { border-color: #3b82f6; background: #ffffff; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        
        select.modern-input { cursor: pointer; color: #0f172a; font-weight: 500; }
        
        .btn-guardar { background: #10b981; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 1.1em; font-weight: 700; cursor: pointer; width: 100%; transition: all 0.2s; box-shadow: 0 4px 6px rgba(16,185,129,0.2); margin-top: 20px; }
        .btn-guardar:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(16,185,129,0.3); }
        
        /* Ajuste para móviles */
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full-width { grid-column: span 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin: 0; font-weight: 800; color: #0f172a;">✏️ Editar Cita</h1>
            <a href="{% url 'agenda' %}" class="btn-volver">⬅ Cancelar</a>
        </div>

        <div class="card-formulario">
            <form method="POST">
                {% csrf_token %}
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>👤 Nombre del Cliente *</label>
                        <input type="text" name="nombre_cliente" class="modern-input" value="{{ cita.nombre_cliente }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>🚗 Vehículo o Matrícula</label>
                        <input type="text" name="vehiculo_info" class="modern-input" value="{{ cita.vehiculo_info|default:'' }}">
                    </div>

                    <div class="form-group full-width">
                        <label>🔧 Motivo de la Cita *</label>
                        <input type="text" name="motivo" class="modern-input" value="{{ cita.motivo }}" required>
                    </div>

                    <div class="form-group">
                        <label>📅 Fecha *</label>
                        <input type="date" name="fecha" class="modern-input" value="{{ fecha_formato }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>🕒 Hora *</label>
                        <input type="time" name="hora" class="modern-input" value="{{ hora_formato }}" required>
                    </div>

                    <div class="form-group full-width">
                        <label>🚦 Estado de la cita</label>
                        <select name="estado" class="modern-input" style="{% if cita.estado == 'Pendiente' %}background-color: #fef9c3;{% elif cita.estado == 'En taller' %}background-color: #d1fae5;{% else %}background-color: #f1f5f9;{% endif %}">
                            <option value="Pendiente" {% if cita.estado == 'Pendiente' %}selected{% endif %}>⏳ Pendiente (Por llegar)</option>
                            <option value="En taller" {% if cita.estado == 'En taller' %}selected{% endif %}>✅ Ya está en el taller</option>
                            <option value="Cancelada" {% if cita.estado == 'Cancelada' %}selected{% endif %}>❌ Cancelada</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>📝 Notas Adicionales (Opcional)</label>
                        <textarea name="notas_adicionales" class="modern-input" rows="3" style="resize: vertical;">{{ cita.notas_adicionales|default:'' }}</textarea>
                    </div>
                </div>

                <button type="submit" class="btn-guardar">💾 Guardar Cambios</button>
            </form>
        </div>
    </div>

    {% include 'taller/widget_ia.html' %}
</body>
</html>
